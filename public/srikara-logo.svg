<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" fill="none">
  <defs>
    <!-- Dark gradient for SRIKARA text (dark charcoal with slight blue shadow) -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d2d3a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <!-- Magenta gradient for HOSPITALS -->
    <linearGradient id="hospGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b5179e"/>
      <stop offset="100%" stop-color="#cc00cc"/>
    </linearGradient>
    <!-- Purple glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Shadow for SRIKARA -->
    <filter id="textShadow" x="-5%" y="-5%" width="115%" height="130%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#6600aa" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════ -->
  <!-- EMBLEM: circular people icon            -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(6, 5)">

    <!-- 8 figures arranged in a circle, each = head circle + raised-arms arc -->
    <!-- Each figure rotated around center (38, 40) -->

    <!-- Figure 1 — top (0°) — bright magenta -->
    <g transform="rotate(0, 38, 40)">
      <circle cx="38" cy="10" r="4" fill="#cc00cc"/>
      <path d="M31 16 Q38 22 45 16" stroke="#cc00cc" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <line x1="38" y1="22" x2="38" y2="30" stroke="#cc00cc" stroke-width="1.8"/>
    </g>

    <!-- Figure 2 — top-right (45°) — purple -->
    <g transform="rotate(45, 38, 40)">
      <circle cx="38" cy="10" r="3.8" fill="#9b00b5"/>
      <path d="M31 16 Q38 22 45 16" stroke="#9b00b5" stroke-width="2" fill="none" stroke-linecap="round"/>
      <line x1="38" y1="22" x2="38" y2="30" stroke="#9b00b5" stroke-width="1.6"/>
    </g>

    <!-- Figure 3 — right (90°) — dark purple -->
    <g transform="rotate(90, 38, 40)">
      <circle cx="38" cy="10" r="3.6" fill="#7b00a0"/>
      <path d="M31 16 Q38 22 45 16" stroke="#7b00a0" stroke-width="2" fill="none" stroke-linecap="round"/>
      <line x1="38" y1="22" x2="38" y2="30" stroke="#7b00a0" stroke-width="1.5"/>
    </g>

    <!-- Figure 4 — bottom-right (135°) — deep purple -->
    <g transform="rotate(135, 38, 40)">
      <circle cx="38" cy="10" r="3.4" fill="#5c0080"/>
      <path d="M31 16 Q38 22 45 16" stroke="#5c0080" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <line x1="38" y1="22" x2="38" y2="30" stroke="#5c0080" stroke-width="1.4"/>
    </g>

    <!-- Figure 5 — bottom (180°) — dark magenta -->
    <g transform="rotate(180, 38, 40)">
      <circle cx="38" cy="10" r="3.5" fill="#8b0066"/>
      <path d="M31 16 Q38 22 45 16" stroke="#8b0066" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <line x1="38" y1="22" x2="38" y2="30" stroke="#8b0066" stroke-width="1.4"/>
    </g>

    <!-- Figure 6 — bottom-left (225°) — medium purple -->
    <g transform="rotate(225, 38, 40)">
      <circle cx="38" cy="10" r="3.6" fill="#7b00a0"/>
      <path d="M31 16 Q38 22 45 16" stroke="#7b00a0" stroke-width="2" fill="none" stroke-linecap="round"/>
      <line x1="38" y1="22" x2="38" y2="30" stroke="#7b00a0" stroke-width="1.5"/>
    </g>

    <!-- Figure 7 — left (270°) — bright purple -->
    <g transform="rotate(270, 38, 40)">
      <circle cx="38" cy="10" r="3.8" fill="#9b00b5"/>
      <path d="M31 16 Q38 22 45 16" stroke="#9b00b5" stroke-width="2" fill="none" stroke-linecap="round"/>
      <line x1="38" y1="22" x2="38" y2="30" stroke="#9b00b5" stroke-width="1.6"/>
    </g>

    <!-- Figure 8 — top-left (315°) — bright magenta -->
    <g transform="rotate(315, 38, 40)">
      <circle cx="38" cy="10" r="4" fill="#cc00cc"/>
      <path d="M31 16 Q38 22 45 16" stroke="#cc00cc" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <line x1="38" y1="22" x2="38" y2="30" stroke="#cc00cc" stroke-width="1.8"/>
    </g>

    <!-- Center glow -->
    <circle cx="38" cy="40" r="7" fill="#cc00cc" opacity="0.15"/>
    <circle cx="38" cy="40" r="4" fill="#b5179e" opacity="0.3"/>
    <circle cx="38" cy="40" r="2" fill="#e040fb" opacity="0.6"/>
    <!-- Light blue center sparkle -->
    <circle cx="38" cy="40" r="1.2" fill="#7dd3fc" opacity="0.9"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- TEXT: SRIKARA                           -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Shadow layer -->
  <text x="90" y="46"
    font-family="Arial Black, Helvetica Neue, sans-serif"
    font-weight="900"
    font-size="34"
    fill="#6600aa"
    opacity="0.25"
    letter-spacing="1"
    transform="translate(2,2)">SRIKARA</text>
  <!-- Main text -->
  <text x="90" y="46"
    font-family="Arial Black, Helvetica Neue, sans-serif"
    font-weight="900"
    font-size="34"
    fill="url(#textGrad)"
    letter-spacing="1">SRIKARA</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- V-tick connector between lines          -->
  <!-- ═══════════════════════════════════════ -->
  <path d="M90 52 L96 62 L102 50"
    stroke="#b5179e"
    stroke-width="3"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- TEXT: HOSPITALS                         -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Shadow layer -->
  <text x="107" y="68"
    font-family="Arial Black, Helvetica Neue, sans-serif"
    font-weight="900"
    font-size="26"
    fill="#6600aa"
    opacity="0.2"
    letter-spacing="2"
    transform="translate(2,2)">HOSPITALS</text>
  <!-- Main text -->
  <text x="107" y="68"
    font-family="Arial Black, Helvetica Neue, sans-serif"
    font-weight="900"
    font-size="26"
    fill="url(#hospGrad)"
    letter-spacing="2">HOSPITALS</text>
</svg>
